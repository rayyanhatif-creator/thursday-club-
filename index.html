<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Elite Challenge System</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00f2ff; }
        body { font-family: 'Segoe UI', sans-serif; background: #050505; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: none; background: rgba(0,0,0,0.3); color: white; text-align: center; box-sizing: border-box; }
        button { background: var(--accent); border: none; padding: 15px 25px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card" id="app">
    <div id="start">
        <h1>نظام التحدي الذكي</h1>
        <button onclick="start()">بدء الرحلة</button>
        <p style="margin-top:20px; font-size:12px; cursor:pointer;" onclick="adminPanel()">لوحة التحكم (Admin)</p>
    </div>

    <div id="quiz" class="hidden">
        <h3 id="qText"></h3>
        <input type="text" id="ans" placeholder="الإجابة...">
        <button onclick="check()">تحقق</button>
    </div>

    <div id="code" class="hidden">
        <h2 style="color:var(--accent)">فك الشفرة (6 أرقام)</h2>
        <p id="hint"></p>
        <input type="number" id="codeIn" placeholder="------">
        <button onclick="verify()">إرسال</button>
    </div>
</div>

<script>
    // الإعدادات (هنا يمكنك تعديل المحتوى بسهولة)
    let gameData = {
        questions: [{q: "ما هو الشيء الذي إذا غليته جمد؟", a: "البيض"}, {q: "عاصمة السعودية؟", a: "الرياض"}],
        codes: ["111111", "222222"],
        locations: ["البيارق", "الطلعة", "سواعد"]
    };

    let state = { qIdx: 0, sIdx: 0 };

    function start() { document.getElementById('start').classList.add('hidden'); document.getElementById('quiz').classList.remove('hidden'); showQ(); }
    
    function showQ() { document.getElementById('qText').innerText = gameData.questions[state.qIdx].q; }

    function check() {
        if(document.getElementById('ans').value === gameData.questions[state.qIdx].a) {
            state.qIdx++;
            if(state.qIdx % 2 === 0) { // يطلب شفرة كل سؤالين
                document.getElementById('quiz').classList.add('hidden');
                document.getElementById('code').classList.remove('hidden');
                document.getElementById('hint').innerText = "تلميح: الرقم في " + gameData.locations[Math.floor(Math.random()*3)];
            } else { showQ(); }
        } else { alert("إجابة خاطئة"); }
    }

    function verify() {
        if(document.getElementById('codeIn').value === gameData.codes[state.sIdx]) {
            state.sIdx++;
            alert("صحيح! تقدم للمرحلة التالية.");
            document.getElementById('code').classList.add('hidden');
            document.getElementById('quiz').classList.remove('hidden');
            showQ();
        } else { alert("رقم خاطئ!"); }
    }

    function adminPanel() {
        let pass = prompt("أدخل كلمة مرور الإدارة:");
        if(pass === "1234") {
            let newQ = prompt("أدخل السؤال الجديد:");
            if(newQ) gameData.questions.push({q: newQ, a: "الجواب"});
            alert("تم التحديث!");
        }
    }
</script>
</body>
</html>
