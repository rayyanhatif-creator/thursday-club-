<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Elite Hunt Engine</title>
    <style>
        body, html { margin: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; }
        canvas { position: absolute; top: 0; left: 0; z-index: 0; }
        .glass-card { 
            position: relative; z-index: 1; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1); padding: 50px; border-radius: 40px; 
            width: 350px; text-align: center; color: #fff; transition: transform 0.1s ease-out;
            box-shadow: 0 0 50px rgba(0,242,255,0.1);
        }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 12px; border: none; background: rgba(0,0,0,0.4); color: #00f2ff; text-align: center; font-size: 1.2rem; }
        button { background: #00f2ff; border: none; padding: 15px 30px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="glass-card" id="app">
    <h1>النظام النخبوي</h1>
    <div id="content">
        <button onclick="next()">ابدأ التحدي</button>
    </div>
</div>

<script>
    // --- محرك الجسيمات (الخلفية) ---
    const c = document.getElementById('c'), ctx = c.getContext('2d');
    c.width = window.innerWidth; c.height = window.innerHeight;
    let particles = Array.from({length: 100}, () => ({x: Math.random()*c.width, y: Math.random()*c.height, s: Math.random()*2}));
    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,c.width,c.height);
        particles.forEach(p => { ctx.fillStyle = '#00f2ff'; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill(); p.y += p.s; if(p.y > c.height) p.y = 0; });
        requestAnimationFrame(draw);
    }
    draw();

    // --- محرك المسابقة ---
    const game = { q: [{q:"شيء كلما أخذت منه كبر؟", a:"الحفرة"}, {q:"عاصمة اليابان؟", a:"طوكيو"}], c: ["123456", "654321"] };
    let stage = 0;
    function next() {
        document.getElementById('content').innerHTML = `<h3>${game.q[stage].q}</h3><input id='ans' type='text'><button onclick='check()'>تأكيد</button>`;
    }
    function check() {
        if(document.getElementById('ans').value === game.q[stage].a) {
            document.getElementById('content').innerHTML = `<h3>أدخل كود الشفرة</h3><input id='codeIn' type='number'><button onclick='verify()'>فك القفل</button>`;
        }
    }
    function verify() {
        if(document.getElementById('codeIn').value === game.c[stage]) {
            stage++; alert("تمت المصادقة!"); next();
        }
    }
    // --- تأثير الدوران الثلاثي الأبعاد ---
    document.addEventListener('mousemove', e => {
        const card = document.querySelector('.glass-card');
        const x = (e.clientX / window.innerWidth - 0.5) * 20;
        const y = (e.clientY / window.innerHeight - 0.5) * 20;
        card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
    });
</script>
</body>
</html>
